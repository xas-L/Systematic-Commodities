# Semi-systematic commodities RV — master settings
# This file is repo-relative. Keep values conservative by default.

version: 1
project: semi_sys_commods

env:
  mode: dev            # dev | paper | live
  timezone: UTC        # All timestamps stored in UTC; exchange-local handled by calendars
  seed: 12345          # For reproducibility of CV folds etc.

paths:
  data_raw: data/raw                   # vendor drops of INDIVIDUAL contracts
  data_meta: data/meta                 # specs, tick sizes, multipliers, FND/LTD, calendars
  data_curated: data/curated           # parquet snapshots (point-in-time)
  reports: reports                     # PM brief, stress packs
  logs: logs
  temp: .tmp
  # secrets (broker keys) are stored outside repo; only a pointer here
  secrets_hint: "../secrets/ib_paper.yaml"   # not committed

calendars:
  # Named trading calendars; files live under config/calendars/
  trading_calendar_ids: [CME, NYMEX, COMEX, CBOT, ICE]
  holiday_files:
    CME:   config/calendars/cme_holidays.csv
    NYMEX: config/calendars/nymex_holidays.csv
    COMEX: config/calendars/comex_holidays.csv
    CBOT:  config/calendars/cbot_holidays.csv
    ICE:   config/calendars/ice_holidays.csv

universe:
  # Curves we will trade. Symbols are future roots (not continuous tickers).
  # Contract metadata (tick_size, multiplier, etc.) is defined in fees_slippage.yaml/specs.
  curves:
    CL:
      exchange: NYMEX
      currency: USD
      month_cycle: ALL            # monthly listings
      min_contracts: 8
      max_tenors: 14
      sector: ENERGY
    NG:
      exchange: NYMEX
      currency: USD
      month_cycle: ALL
      min_contracts: 10
      max_tenors: 18
      sector: ENERGY
    RB:
      exchange: NYMEX
      currency: USD
      month_cycle: ALL
      min_contracts: 8
      max_tenors: 12
      sector: ENERGY
    HO:
      exchange: NYMEX
      currency: USD
      month_cycle: ALL
      min_contracts: 8
      max_tenors: 12
      sector: ENERGY
    LCO:
      exchange: ICE
      currency: USD
      month_cycle: ALL
      min_contracts: 8
      max_tenors: 14
      sector: ENERGY
    GC:
      exchange: COMEX
      currency: USD
      month_cycle: [G, J, M, Q, V, Z]   # Feb, Apr, Jun, Aug, Oct, Dec
      min_contracts: 6
      max_tenors: 8
      sector: METALS
    SI:
      exchange: COMEX
      currency: USD
      month_cycle: [F, H, K, N, U, Z]   # Jan, Mar, May, Jul, Sep, Dec
      min_contracts: 6
      max_tenors: 8
      sector: METALS
    HG:
      exchange: COMEX
      currency: USD
      month_cycle: [H, K, N, U, Z]      # Mar, May, Jul, Sep, Dec
      min_contracts: 6
      max_tenors: 8
      sector: METALS
    ZC:
      exchange: CBOT
      currency: USD
      month_cycle: [H, K, N, U, Z]      # Mar, May, Jul, Sep, Dec
      min_contracts: 5
      max_tenors: 8
      sector: GRAINS
    ZW:
      exchange: CBOT
      currency: USD
      month_cycle: [H, K, N, U, Z]
      min_contracts: 5
      max_tenors: 8
      sector: GRAINS
    ZS:
      exchange: CBOT
      currency: USD
      month_cycle: [F, H, K, Q, U, X]   # Jan, Mar, May, Aug, Sep, Nov
      min_contracts: 5
      max_tenors: 8
      sector: OILSEEDS

curve_construction:
  price_field_order: [settle, last]   # fallbacks if settle missing
  drop_stale_after_days: 10
  align_method: inner
  log_spreads: true
  tenors_target: 10
  filter:
    min_volume: 500
    min_open_interest: 2000
  roll_policy:
    prefer_exchange_combo: true
    roll_window_days: 5
    avoid_first_notice_days: 3
    avoid_last_trade_days: 1

models:
  # Model hub order == attribution order.
  # Set enabled: true for each model you want to run.
  hub_order: [carry_momo_season, pca, coint_adjacent]

  carry_momo_season:
    enabled: true                      # PRIMARY signal — must be true to produce any P&L
    k_momentum_days: 20
    ewma_span: 60
    seasonality:
      enabled: true
      significance_min_t: 2.0

  pca:
    enabled: false                     # Enable after fetching real data to add attribution layer
    n_components: 3
    ewma_span: 60

  nelson_siegel:
    enabled: false                     # Optional curve factor model; off by default
    lambda_decay: 0.060

  coint_adjacent:
    enabled: false                     # Enable for cointegration overlay; computationally heavier
    lookback_days: 250
    pval_entry: 0.05

signal_and_sizing:
  z_clip: 3.0
  risk_per_curve_usd: 100000
  max_gross_usd: 2000000
  convert_to_combo_sizes: true
  vol_target:
    enabled: true
    lookback_days: 60
    annual_vol_target: 0.10

execution_sim:
  bar: daily
  decision_price: settle
  trade_on_next_bar: true
  combo_only: true
  allow_legging: false
  partial_fills: true
  child_order:
    timeout_seconds: 5
    queue_fraction: 0.3
  cost_profile: conservative
  slippage_profile: conservative

walkforward:
  scheme: anchored
  embargo_days: 5
  folds:
    # Default folds for synthetic data. run_walkforward.py auto-generates
    # from actual data range if these don't overlap the loaded data.
    - {train_start: "2015-01-01", train_end: "2018-12-31", test_start: "2019-01-01", test_end: "2019-06-30"}
    - {train_start: "2015-01-01", train_end: "2019-06-30", test_start: "2019-07-01", test_end: "2019-12-31"}
    - {train_start: "2015-01-01", train_end: "2019-12-31", test_start: "2020-01-01", test_end: "2020-06-30"}
    - {train_start: "2015-01-01", train_end: "2020-06-30", test_start: "2020-07-01", test_end: "2020-12-31"}
    - {train_start: "2015-01-01", train_end: "2020-12-31", test_start: "2021-01-01", test_end: "2021-12-31"}
    - {train_start: "2015-01-01", train_end: "2021-12-31", test_start: "2022-01-01", test_end: "2022-12-31"}
    - {train_start: "2015-01-01", train_end: "2022-12-31", test_start: "2023-01-01", test_end: "2023-12-31"}
    - {train_start: "2015-01-01", train_end: "2023-12-31", test_start: "2024-01-01", test_end: "2024-12-31"}

risk:
  per_curve:
    CL: {risk_budget_usd: 120000, max_open_orders: 12, max_positions: 6,
         flatten_days_before_fnd: 3, flatten_days_before_ltd: 1}
    NG: {risk_budget_usd: 120000, max_open_orders: 12, max_positions: 6,
         flatten_days_before_fnd: 3, flatten_days_before_ltd: 1}
    RB: {risk_budget_usd: 80000, max_open_orders: 10, max_positions: 5,
         flatten_days_before_fnd: 3, flatten_days_before_ltd: 1}
    HO: {risk_budget_usd: 80000, max_open_orders: 10, max_positions: 5,
         flatten_days_before_fnd: 3, flatten_days_before_ltd: 1}
    LCO: {risk_budget_usd: 100000, max_open_orders: 10, max_positions: 5,
          flatten_days_before_fnd: 3, flatten_days_before_ltd: 1}
    GC: {risk_budget_usd: 60000, max_open_orders: 8, max_positions: 4,
         flatten_days_before_fnd: 4, flatten_days_before_ltd: 1}
    SI: {risk_budget_usd: 60000, max_open_orders: 8, max_positions: 4,
         flatten_days_before_fnd: 4, flatten_days_before_ltd: 1}
    HG: {risk_budget_usd: 60000, max_open_orders: 8, max_positions: 4,
         flatten_days_before_fnd: 4, flatten_days_before_ltd: 1}
    ZC: {risk_budget_usd: 60000, max_open_orders: 8, max_positions: 4,
         flatten_days_before_fnd: 5, flatten_days_before_ltd: 1}
    ZW: {risk_budget_usd: 60000, max_open_orders: 8, max_positions: 4,
         flatten_days_before_fnd: 5, flatten_days_before_ltd: 1}
    ZS: {risk_budget_usd: 60000, max_open_orders: 8, max_positions: 4,
         flatten_days_before_fnd: 5, flatten_days_before_ltd: 1}
  concentration_limits:
    max_curves_per_sector: 3
  portfolio_caps:
    max_gross_usd: 2000000
    max_net_usd: 1000000
  kill_criteria:
    model_health_breach: true
    factor_drift_threshold: 0.5
    live_slip_over_backtest_bp: 50
    dd_sigma_threshold: 3.0

state_conditioning:
  tags:
    seasonality: true
    roll_windows: true
    inventory_proxies:
      EIA_energy: true
      USDA_grains: true
    refinery_maintenance: true
    shipping_freight_stress: true
    storage_economics_flags: true

ops:
  hot_reload: true
  kill_switch:
    soft_file: PAUSE.NOW
    hard_file: FLATTEN.NOW
  logging:
    level: INFO
    rotate_mb: 50
  metrics:
    sink: csv
    out_dir: logs/metrics

reporting:
  pm_brief:
    out_dir: reports/pm_brief
    include_tables: [attribution, walkforward, stress]
    include_charts: [factor_loadings, turnover, pnl_path]
  telemetry:
    export_trades_csv: true
    export_signals_csv: true