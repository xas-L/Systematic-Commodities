# Fees, tick specs and slippage assumptions for exchange combo trading
# All monetary values are USD unless noted. Keep assumptions conservative.

version: 1

profiles:
  # Named profiles referenced by settings.yaml (cost_profile, slippage_profile)
  conservative:
    combo_half_spread_ticks: 1.0     # assume crossing half the combo spread
    legging_penalty_ticks: 1.0       # extra if legs are executed separately
    illiquidity_extra_ticks: 1.0     # add when TOB size is small
    partial_fill_ratio: 0.30         # fraction of TOB filled on first attempt
    fee_round_turn_per_lot: 2.50     # all-in RT per lot for exchange combo (ex-broker commissions)
  baseline:
    combo_half_spread_ticks: 0.5
    legging_penalty_ticks: 0.5
    illiquidity_extra_ticks: 0.5
    partial_fill_ratio: 0.40
    fee_round_turn_per_lot: 2.00
  optimistic:
    combo_half_spread_ticks: 0.25
    legging_penalty_ticks: 0.25
    illiquidity_extra_ticks: 0.25
    partial_fill_ratio: 0.50
    fee_round_turn_per_lot: 1.50

# Product specs. Tick maths is used for slippage and P&L conversion.
# tick_value = tick_size * multiplier; combo pricing is in underlying price units.
products:
  CL:
    name: WTI Crude Oil
    exchange: NYMEX
    currency: USD
    tick_size: 0.01
    multiplier: 1000.0
    tick_value: 10.0
    combo:
      min_price_increment: 0.01
      typical_half_spread_ticks: 1.0
      notes: "Monthly listings; deep liquidity in front 6–12 contracts"
  NG:
