# Venue-level add-ons. If you connect to a broker API for paper, set broker_commission here (not in repo).
venues:
  NYMEX:
    maker_rebate_per_lot: 0.00
    taker_fee_per_lot: 0.00
  COMEX:
    maker_rebate_per_lot: 0.00
    taker_fee_per_lot: 0.00
  CBOT:
    maker_rebate_per_lot: 0.00
    taker_fee_per_lot: 0.00
  ICE:
    maker_rebate_per_lot: 0.00
    taker_fee_per_lot: 0.00

# Mapping for product → default profiles (overridable at runtime per backtest)
default_mappings:
  cost_profile: conservative
  slippage_profile: conservative
  by_product:
    CL: {cost_profile: conservative, slippage_profile: conservative}
    NG: {cost_profile: conservative, slippage_profile: conservative}
    RB: {cost_profile: conservative, slippage_profile: conservative}
    HO: {cost_profile: conservative, slippage_profile: conservative}
